plugins {
    id 'multiloader-loader'
    id 'net.neoforged.moddev'
}

// Datagen providers are dev-only (./gradlew :neoforge:runData) and not yet ported to
// the 1.21 NeoForge datagen API; exclude them so the runtime client/server compiles.
// The generated assets/data already exist under src/main/resources.
sourceSets.main.java {
    exclude 'dev/hexnowloading/dungeonnowloading/datagen/**'
}

neoForge {
    version = neoforge_version
    // Automatically enable neoforge AccessTransformers if the file exists
    def at = project(':common').file('src/main/resources/META-INF/accesstransformer.cfg')
    if (at.exists()) {
        accessTransformers.from(at.absolutePath)
    }
    parchment {
        minecraftVersion = parchment_minecraft
        mappingsVersion = parchment_version
    }
    runs {
        configureEach {
            systemProperty('neoforge.enabledGameTestNamespaces', mod_id)
            // Mixin diagnostics: verbose injection logging to triage "Scanned 0 target(s)".
            systemProperty('mixin.debug.verbose', 'true')
            systemProperty('mixin.debug.countInjections', 'true')
            systemProperty('mixin.env.disableRefMap', 'true')
            ideName = "NeoForge ${it.name.capitalize()} (${project.path})" // Unify the run config names with fabric
        }
        client {
            client()
        }
        data {
            data()
            // DataGen: "./gradlew :neoforge:runData"
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
        server {
            server()
        }
    }
    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    implementation "fuzs.forgeconfigapiport:forgeconfigapiport-neoforge:${forgeconfigapiport_version}"
}

sourceSets.main.resources { srcDir 'src/generated/resources' }
